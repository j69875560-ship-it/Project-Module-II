<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly - Dictionary</title>
</head>
<body>
    <header>
        <h1>Wordly - Dictionary</h1>
        <p>Wordly - Dictionary is a single-page dictonary. <br> Like any other dictonary you can look up words but it also allows you to select your favorite words and store them for later. <br> Your looked up words also give pronounciations so enjoy.</p>
    </header>
<main>
<form action="submit">
<label for="input-text">Type Word:</label>
<input type="text" id="input-text" placeholder="Enter word..." autocomplete="address-level4">
<button type="submit" id="submit-btn">Search</button>
<div id="results-div">
<p id="results"></p>
</div>
<div id="error-message-div" >
<p id="error-message"></p>
</div>
</form>
</main>
</body>
</html>
